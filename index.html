const CLOUDINARY_CLOUD='deejgvpv8';
const CLOUDINARY_PRESET='waslaup';

async function compressImage(file, maxSizeMB=9){
  return new Promise((resolve)=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let {width,height}=img;
        // Scale down if too large
        const maxDim=2048;
        if(width>maxDim||height>maxDim){
          if(width>height){height=Math.round(height*maxDim/width);width=maxDim;}
          else{width=Math.round(width*maxDim/height);height=maxDim;}
        }
        canvas.width=width;canvas.height=height;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,width,height);
        // Try quality from 0.9 down until under maxSizeMB
        let quality=0.9;
        const tryCompress=()=>{
          canvas.toBlob(blob=>{
            if(!blob){resolve(file);return;}
            if(blob.size<=maxSizeMB*1024*1024||quality<=0.3){
              resolve(new File([blob],file.name,{type:'image/jpeg'}));
            } else {
              quality-=0.1;
              tryCompress();
            }
          },'image/jpeg',quality);
        };
        tryCompress();
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadToCloudinary(file){
  // Compress if image
  if(file.type.startsWith('image/')){
    toast('جاري ضغط الصورة...','🗜️');
    file=await compressImage(file);
  }
  const fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',CLOUDINARY_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,{method:'POST',body:fd});
  const data=await res.json();
  if(data.secure_url)return data.secure_url;
  console.error('Cloudinary error:',data);
  throw new Error(data.error?.message||'Upload failed');
}

const gi=n=>n?n.split(' ').map(x=>x[0]).join('').slice(0,2):'?';
const fn=n=>{if(!n&&n!==0)return 0;if(n>=1000)return(n/1000).toFixed(1)+'K';return n};
const rc=()=>COLORS[Math.floor(Math.random()*COLORS.length)];
const isAdmin=()=>S.currentUser&&S.currentUser.email===ADMIN_EMAIL;
function ta(ts){
  if(!ts)return'الآن';
  const d=ts.toDate?ts.toDate():new Date(ts);
  const diff=Math.floor((Date.now()-d)/1000);
  if(diff<60)return'الآن';
  if(diff<3600)return`منذ ${Math.floor(diff/60)} د`;
  if(diff<86400)return`منذ ${Math.floor(diff/3600)} س`;
  return`منذ ${Math.floor(diff/86400)} يوم`;
}
function toast(msg,icon='✅'){
  S.toast={msg,icon};r();
  setTimeout(()=>{S.toast=null;r();},2800);
}

auth.onAuthStateChanged(async user=>{
  const el=document.getElementById('loading');
  if(el)el.style.display='none';
  if(user){
    S.currentUser=user;
    const doc=await db.collection('wasla_profiles').doc(user.uid).get();
    if(doc.exists){
      S.currentProfile=doc.data();
    } else {
      S.currentProfile={name:user.displayName||'مستخدم',handle:user.email.split('@')[0],color:rc(),bio:'',followers:0,following:0};
    }
    // Mark admin
    if(user.email===ADMIN_EMAIL) S.currentProfile.isAdmin=true;
    loadPosts();
    loadFollowing();
    loadNotifications();
    loadTrending();
  } else {
    S.currentUser=null; S.currentProfile=null;
    S.posts=[]; S.loadingPosts=false;
  }
  r();
});

function loadPosts(){
  if(unsubPosts)unsubPosts();
  S.loadingPosts=true;
  unsubPosts=db.collection('wasla_posts')
    .orderBy('createdAt','desc').limit(50)
    .onSnapshot(snap=>{
      S.posts=snap.docs.map(d=>({id:d.id,...d.data(),_liked:S.likedPosts[d.id]||false}));
      S.loadingPosts=false;
      r();
      refreshLikes();
    },err=>{console.error(err);S.loadingPosts=false;r();});
}

async function loadFollowing(){
  if(!S.currentUser)return;
  const snap=await db.collection('wasla_follows').where('followerId','==',S.currentUser.uid).get();
  S.followingMap={};
  snap.docs.forEach(d=>{S.followingMap[d.data().followingId]=true;});
  r();
}

function loadNotifications(){
  if(!S.currentUser)return;
  if(unsubNotifs)unsubNotifs();
  unsubNotifs=db.collection('wasla_notifications')
    .where('toUserId','==',S.currentUser.uid)
    .orderBy('createdAt','desc').limit(30)
    .onSnapshot(snap=>{
      S.notifications=snap.docs.map(d=>({id:d.id,...d.data()}));
      S.notifUnread=S.notifications.filter(n=>!n.read).length;
      r();
    },()=>{});
}


function loadTrending(){
  if(!S.currentUser)return;
  db.collection('wasla_posts').get().then(snap=>{
    const counts={};
    snap.docs.forEach(d=>{
      const text=d.data().text||'';
      const tags=text.match(/#[\u0600-\u06FFa-zA-Z0-9_]+/g)||[];
      tags.forEach(t=>{ counts[t]=(counts[t]||0)+1; });
    });
    S.realTrending=Object.entries(counts)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5)
      .map(([tag,cnt],i)=>({tag,count:cnt+(cnt===1?' منشور':' منشور'),num:String(i+1).padStart(2,'0')}));
    r();
  }).catch(e=>{ console.error('trending error:',e); });
}

async function markNotifsRead(){
  if(!S.currentUser)return;
  const batch=db.batch();
  S.notifications.filter(n=>!n.read).forEach(n=>{
    batch.update(db.collection('wasla_notifications').doc(n.id),{read:true});
  });
  await batch.commit().catch(()=>{});
  S.notifUnread=0;
  r();
}

async function refreshLikes(){
  if(!S.currentUser)return;
  const uid=S.currentUser.uid;
  const ids=S.posts.map(p=>p.id);
  for(const id of ids){
    const doc=await db.collection('wasla_likes').doc(uid+'_'+id).get();
    S.likedPosts[id]=doc.exists;
  }
  S.posts=S.posts.map(p=>({...p,_liked:S.likedPosts[p.id]||false}));
  r();
}

// AUTH ACTIONS
async function doLogin(){
  const e=document.getElementById('auth-email')?.value?.trim();
  const p=document.getElementById('auth-pass')?.value;
  if(!e||!p){S.authError='أدخل الإيميل وكلمة المرور';r();return;}
  S.authLoading=true;S.authError='';r();
  try{await auth.signInWithEmailAndPassword(e,p);}
  catch(err){
    S.authLoading=false;
    S.authError=err.code==='auth/user-not-found'||err.code==='auth/wrong-password'||err.code==='auth/invalid-credential'?'الإيميل أو كلمة المرور غلط ❌':err.code==='auth/too-many-requests'?'حاول بعد شوية ⏳':'حدث خطأ، حاول مجدداً';
    r();
  }
}

async function doRegister(){
  const name=document.getElementById('reg-name')?.value?.trim();
  const handle=document.getElementById('reg-handle')?.value?.trim().replace(/^@/,'').replace(/\s/g,'');
  const email=document.getElementById('reg-email')?.value?.trim();
  const pass=document.getElementById('reg-pass')?.value;
  if(!name||!handle||!email||!pass){S.authError='من فضلك اكمل كل الحقول';r();return;}
  if(pass.length<6){S.authError='كلمة المرور ٦ أحرف على الأقل';r();return;}
  S.authLoading=true;S.authError='';r();
  try{
    const ex=await db.collection('wasla_profiles').where('handle','==',handle).get();
    if(!ex.empty){S.authError='اسم المستخدم ده موجود ❌';S.authLoading=false;r();return;}
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    await cred.user.updateProfile({displayName:name});
    const color=rc();
    const isAdminUser=email===ADMIN_EMAIL;
    const profile={name,handle,email,color,bio:'',followers:0,following:0,posts:0,isAdmin:isAdminUser,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
    await db.collection('wasla_profiles').doc(cred.user.uid).set(profile);
    S.currentProfile=profile;
    // Send email verification
    await cred.user.sendEmailVerification();
    toast('أهلاً بك في Wasla! تم إرسال تأكيد للإيميل 📧');
  }catch(err){
    S.authLoading=false;
    S.authError=err.code==='auth/email-already-in-use'?'الإيميل ده مستخدم بالفعل ❌':'حدث خطأ، حاول مجدداً';
    r();
  }
}

function doLogout(){auth.signOut();toast('تم تسجيل الخروج 👋');}

async function createPost(){
  const text=S.composerText.trim();
  if(!text&&!S.composerImage){toast('اكتب شيئاً أو أضف صورة ✍️','⚠️');return;}
  const p=S.currentProfile;
  const btn=document.getElementById('post-btn');
  if(btn)btn.disabled=true;
  try{
    let imageUrl=null;
    if(S.composerImage){
      S.composerImageUploading=true;r();
      imageUrl=await uploadToCloudinary(S.composerImage);
      S.composerImageUploading=false;
    }
    await db.collection('wasla_posts').add({
      userId:S.currentUser.uid,
      userName:p.name,
      userHandle:p.handle,
      userColor:p.color||'#7c5cfc',
      userIsAdmin:p.isAdmin||false,
      userPhotoURL:p.photoURL||null,
      text,
      imageUrl:imageUrl||null,
      likes:0,comments:0,reposts:0,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    S.composerText='';
    S.composerImage=null;
    S.composerImagePreview=null;
    toast('تم نشر منشورك! 🎉');
    loadTrending();
  }catch(e){S.composerImageUploading=false;toast('حدث خطأ، حاول مجدداً','❌');}
  if(btn)btn.disabled=false;
  r();
}

async function toggleLike(postId){
  if(!S.currentUser)return;
  const uid=S.currentUser.uid;
  const likeRef=db.collection('wasla_likes').doc(uid+'_'+postId);
  const postRef=db.collection('wasla_posts').doc(postId);
  const ex=await likeRef.get();
  const idx=S.posts.findIndex(p=>p.id===postId);
  if(ex.exists){
    await likeRef.delete();
    await postRef.update({likes:firebase.firestore.FieldValue.increment(-1)});
    S.likedPosts[postId]=false;
    if(idx>-1){S.posts[idx]._liked=false;S.posts[idx].likes=Math.max(0,(S.posts[idx].likes||1)-1);}
  } else {
    await likeRef.set({userId:uid,postId,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await postRef.update({likes:firebase.firestore.FieldValue.increment(1)});
    S.likedPosts[postId]=true;
    if(idx>-1){S.posts[idx]._liked=true;S.posts[idx].likes=(S.posts[idx].likes||0)+1;}
    const post=S.posts[idx];
    if(post&&post.userId!==uid){
      db.collection('wasla_notifications').add({toUserId:post.userId,fromUserName:S.currentProfile.name,type:'like',text:'أعجب بمنشورك',read:false,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});
    }
  }
  r();
}

async function toggleComments(postId){
  S.openComments[postId]=!S.openComments[postId];
  if(S.openComments[postId]){
    const snap=await db.collection('wasla_comments').where('postId','==',postId).orderBy('createdAt','asc').get();
    S.commentsData[postId]=snap.docs.map(d=>({id:d.id,...d.data()}));
  }
  r();
}

async function addComment(postId){
  const text=(S.newComment[postId]||'').trim();
  if(!text)return;
  const p=S.currentProfile;
  await db.collection('wasla_comments').add({postId,userId:S.currentUser.uid,userName:p.name,text,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  await db.collection('wasla_posts').doc(postId).update({comments:firebase.firestore.FieldValue.increment(1)});
  S.newComment[postId]='';
  const idx=S.posts.findIndex(p=>p.id===postId);
  if(idx>-1)S.posts[idx].comments=(S.posts[idx].comments||0)+1;
  const snap=await db.collection('wasla_comments').where('postId','==',postId).orderBy('createdAt','asc').get();
  S.commentsData[postId]=snap.docs.map(d=>({id:d.id,...d.data()}));
  r();
}

async function repost(postId){
  const idx=S.posts.findIndex(p=>p.id===postId);
  await db.collection('wasla_posts').doc(postId).update({reposts:firebase.firestore.FieldValue.increment(1)});
  if(idx>-1)S.posts[idx].reposts=(S.posts[idx].reposts||0)+1;
  toast('تم إعادة النشر 🔄');r();
}

async function deletePost(postId){
  if(!confirm('هل تريد حذف المنشور؟'))return;
  await db.collection('wasla_posts').doc(postId).delete();
  toast('تم الحذف 🗑️');
}

function pickPostImage(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>50*1024*1024){toast('الصورة أكبر من 50MB','⚠️');return;}
    S.composerImage=file;
    const reader=new FileReader();
    reader.onload=ev=>{S.composerImagePreview=ev.target.result;r();};
    reader.readAsDataURL(file);
  };
  inp.click();
}

function removePostImage(){S.composerImage=null;S.composerImagePreview=null;r();}

async function toggleFollow(targetUid, targetProfile){
  if(!S.currentUser||targetUid===S.currentUser.uid)return;
  const uid=S.currentUser.uid;
  const followRef=db.collection('wasla_follows').doc(uid+'_'+targetUid);
  const targetRef=db.collection('wasla_profiles').doc(targetUid);
  const myRef=db.collection('wasla_profiles').doc(uid);
  const already=S.followingMap[targetUid];
  if(already){
    await followRef.delete();
    await targetRef.update({followers:firebase.firestore.FieldValue.increment(-1)});
    await myRef.update({following:firebase.firestore.FieldValue.increment(-1)});
    S.followingMap[targetUid]=false;
    S.currentProfile.following=Math.max(0,(S.currentProfile.following||1)-1);
    toast('تم إلغاء المتابعة');
  } else {
    await followRef.set({followerId:uid,followingId:targetUid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await targetRef.update({followers:firebase.firestore.FieldValue.increment(1)});
    await myRef.update({following:firebase.firestore.FieldValue.increment(1)});
    S.followingMap[targetUid]=true;
    S.currentProfile.following=(S.currentProfile.following||0)+1;
    toast(`أنت الآن تتابع ${targetProfile?.name||''} ✅`);
    // notification
    db.collection('wasla_notifications').add({toUserId:targetUid,fromUserName:S.currentProfile.name,type:'follow',text:'بدأ يتابعك',read:false,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});
  }
  // update viewing profile count if open
  if(S.viewingProfile&&S.viewingProfile.uid===targetUid){
    S.viewingProfile.followers=(S.viewingProfile.followers||0)+(already?-1:1);
  }
  r();
}

function getConvoId(uid1, uid2){
  return [uid1,uid2].sort().join('_');
}

async function loadConversations(){
  if(!S.currentUser)return;
  S.convoLoading=true; r();
  try{
    const snap=await db.collection('wasla_conversations')
      .where('members','array-contains',S.currentUser.uid)
      .orderBy('lastAt','desc').limit(20).get();
    const convos=[];
    for(const d of snap.docs){
      const data={id:d.id,...d.data()};
      const otherUid=data.members.find(u=>u!==S.currentUser.uid);
      if(otherUid){
        const profDoc=await db.collection('wasla_profiles').doc(otherUid).get();
        if(profDoc.exists) data.otherProfile={uid:otherUid,...profDoc.data()};
      }
      convos.push(data);
    }
    S.conversations=convos;
  }catch(e){S.conversations=[];}
  S.convoLoading=false; r();
}

async function openConvo(otherUid, otherProfile){
  const myUid=S.currentUser.uid;
  const convoId=getConvoId(myUid, otherUid);
  S.activeConvo=convoId;
  S.activeConvoProfile=otherProfile;
  S.convoMessages=[];
  r();
  // Create conversation doc if not exists
  const convoRef=db.collection('wasla_conversations').doc(convoId);
  const convoDoc=await convoRef.get();
  if(!convoDoc.exists){
    await convoRef.set({members:[myUid,otherUid],lastAt:firebase.firestore.FieldValue.serverTimestamp(),lastMsg:''}).catch(()=>{});
  }
  // Unsubscribe previous
  if(S.unsubMsgs)S.unsubMsgs();
  S.unsubMsgs=db.collection('wasla_messages')
    .where('convoId','==',convoId)
    .orderBy('createdAt','asc').limit(100)
    .onSnapshot(snap=>{
      S.convoMessages=snap.docs.map(d=>({id:d.id,...d.data()}));
      r();
      // Scroll to bottom
      setTimeout(()=>{const el=document.getElementById('msgs-scroll');if(el)el.scrollTop=el.scrollHeight;},100);
    },()=>{});
}

async function sendMessage(){
  const text=(S.msgText||'').trim();
  if(!text||!S.activeConvo||!S.currentUser)return;
  const p=S.currentProfile;
  S.msgText=''; r();
  const msg={convoId:S.activeConvo,userId:S.currentUser.uid,userName:p.name,userColor:p.color||'#7c5cfc',text,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
  await db.collection('wasla_messages').add(msg).catch(()=>{});
  await db.collection('wasla_conversations').doc(S.activeConvo).update({lastAt:firebase.firestore.FieldValue.serverTimestamp(),lastMsg:text}).catch(()=>{});
}

function closeConvo(){
  if(S.unsubMsgs){S.unsubMsgs();S.unsubMsgs=null;}
  S.activeConvo=null; S.activeConvoProfile=null; S.convoMessages=[];
  r();
}

async function startMessageWith(uid, profile){
  S.page='messages';
  r();
  setTimeout(()=>loadConversations(),100);
  setTimeout(()=>openConvo(uid, profile),300);
}

async function doSearch(){
  const q=(S.searchQuery||'').trim().toLowerCase();
  if(!q){S.searchResults=[];r();return;}
  S.searchLoading=true;r();
  try{
    const snap=await db.collection('wasla_profiles').get();
    S.searchResults=snap.docs
      .map(d=>({uid:d.id,...d.data()}))
      .filter(u=>{
        const name=(u.name||'').toLowerCase();
        const handle=(u.handle||'').toLowerCase();
        return name.includes(q)||handle.includes(q);
      })
      .filter(u=>u.uid!==S.currentUser?.uid)
      .slice(0,20);
  }catch(e){S.searchResults=[];}
  S.searchLoading=false;r();
}

// VIEW OTHER PROFILE
// ============================
async function viewProfile(uid){
  if(uid===S.currentUser?.uid){nav('profile');return;}
  S.prevPage=S.page;
  S.page='viewprofile';
  S.viewingProfile=null;
  S.viewingProfilePosts=[];
  r();
  try{
    const doc=await db.collection('wasla_profiles').doc(uid).get();
    if(!doc.exists){toast('المستخدم مش موجود','❌');S.page=S.prevPage||'feed';r();return;}
    S.viewingProfile={uid,...doc.data()};
    r(); // ← اعرض البروفايل فوراً قبل ما المنشورات تتحمل
    try{
      const postsSnap=await db.collection('wasla_posts').where('userId','==',uid).orderBy('createdAt','desc').get();
      S.viewingProfilePosts=postsSnap.docs.map(d=>({id:d.id,...d.data()}));
    }catch(e){
      // Fallback لو مفيش index على Firestore
      const postsSnap=await db.collection('wasla_posts').where('userId','==',uid).get();
      S.viewingProfilePosts=postsSnap.docs
        .map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    }
    r();
  }catch(e){
    toast('حدث خطأ في تحميل البروفايل','❌');
    S.page=S.prevPage||'feed';
    r();
  }
}

async function showFollowModal(uid, type){
  S.followModal=type;
  S.followModalList=[];
  S.followModalLoading=true;
  r();
  const field=type==='followers'?'followingId':'followerId';
  const otherField=type==='followers'?'followerId':'followingId';
  const snap=await db.collection('wasla_follows').where(field,'==',uid).get();
  const uids=snap.docs.map(d=>d.data()[otherField]);
  const profiles=[];
  for(const u of uids){
    const d=await db.collection('wasla_profiles').doc(u).get();
    if(d.exists)profiles.push({uid:u,...d.data()});
  }
  S.followModalList=profiles;
  S.followModalLoading=false;
  r();
}

function closeFollowModal(){S.followModal=null;S.followModalList=[];r();}

function r(){
  document.getElementById('app').innerHTML=buildApp();
}

function buildApp(){
  if(!S.currentUser)return buildAuth();
  return `
    ${S.toast?`<div class="toast">${S.toast.icon} ${S.toast.msg}</div>`:''}
    ${S.followModal?buildFollowModal():''}
    <div class="app ${S.theme==='light'?'light':''}">
      ${buildSidebar()}${buildTopbar()}
      <div class="main">
        ${S.page==='messages'?buildMessages():`<div class="feed-area">${
          S.page==='feed'?buildFeed():
          S.page==='explore'?buildExplore():
          S.page==='notifications'?buildNotifs():
          S.page==='profile'?buildProfile():
          S.page==='viewprofile'?buildViewProfile():
          S.page==='admin'?buildAdmin():''
        }</div>`}
        ${S.page!=='messages'?buildRightPanel():''}
      </div>
      ${buildBottomNav()}
    </div>
  `;
}

// ============================
// AUTH
// ============================
function buildAuth(){
  const isLogin=S.authMode==='login';
  return `
    <div class="auth-screen ${S.theme==='light'?'light':''}">
      <div class="auth-left">
        <div style="position:absolute;width:400px;height:400px;border-radius:50%;background:var(--accent);top:-100px;right:-100px;filter:blur(80px);opacity:.1;pointer-events:none"></div>
        <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:var(--warm);bottom:-50px;left:-50px;filter:blur(80px);opacity:.1;pointer-events:none"></div>
        <div style="position:relative;z-index:1;text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:52px;font-weight:900;line-height:1;background:linear-gradient(135deg,#9d7ffe,#ff8c42);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Wasla</div>
          <div style="font-size:30px;font-weight:800;background:linear-gradient(135deg,#9d7ffe,#ff8c42);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px">وصلة</div>
          <div style="color:rgba(255,255,255,.6);font-size:15px;max-width:300px;line-height:1.6">ابقَ على تواصل مع من تحب، شارك لحظاتك، واكتشف عالماً جديداً</div>
          <div style="display:flex;gap:10px;justify-content:center;margin-top:32px;flex-wrap:wrap">
            ${['🌍 تواصل عالمي','📸 شارك لحظاتك','💬 دردش بحرية','🚀 محتوى ترندي'].map(t=>`<div style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:7px 14px;font-size:12px;color:rgba(255,255,255,.7)">${t}</div>`).join('')}
          </div>
        </div>
      </div>
      <div class="auth-right">
        <div style="margin-bottom:24px;text-align:center;width:100%">
          <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--accent2),var(--warm));-webkit-background-clip:text;-webkit-text-fill-color:transparent">Wasla - وصلة</div>
          <div style="color:var(--text2);font-size:14px;margin-top:4px">${isLogin?'أهلاً بك مجدداً 👋':'انضم إلى وصلة اليوم 🚀'}</div>
        </div>
        ${S.authError?`<div class="error-msg">${S.authError}</div>`:''}

          <div class="input-group"><label class="input-label">البريد الإلكتروني</label><input class="input-field" type="email" id="auth-email" placeholder="you@example.com" dir="ltr" onkeydown="if(event.key==='Enter')doLogin()"></div>
          <div class="input-group"><label class="input-label">كلمة المرور</label><input class="input-field" type="password" id="auth-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
          <button class="auth-btn" onclick="doLogin()" ${S.authLoading?'disabled':''}>${S.authLoading?'<span class="spinner spinner-sm"></span> جاري الدخول...':'تسجيل الدخول'}</button>
          <div class="auth-switch">ليس لديك حساب؟ <span onclick="switchAuth('register')">سجّل الآن</span></div>
        `:`
          <div class="input-group"><label class="input-label">الاسم الكامل</label><input class="input-field" type="text" id="reg-name" placeholder="أحمد محمد"></div>
          <div class="input-group"><label class="input-label">اسم المستخدم</label><input class="input-field" type="text" id="reg-handle" placeholder="ahmed123" dir="ltr"></div>
          <div class="input-group"><label class="input-label">البريد الإلكتروني</label><input class="input-field" type="email" id="reg-email" placeholder="you@example.com" dir="ltr"></div>
          <div class="input-group"><label class="input-label">كلمة المرور</label><input class="input-field" type="password" id="reg-pass" placeholder="٦ أحرف على الأقل" onkeydown="if(event.key==='Enter')doRegister()"></div>
          <button class="auth-btn" onclick="doRegister()" ${S.authLoading?'disabled':''}>${S.authLoading?'<span class="spinner spinner-sm"></span> جاري الإنشاء...':'إنشاء حساب'}</button>
          <div class="auth-switch">لديك حساب؟ <span onclick="switchAuth('login')">سجّل دخولك</span></div>
        `}
        <div style="margin-top:16px;display:flex;justify-content:center"><div class="theme-toggle" onclick="toggleTheme()" style="width:auto;padding:0 12px;gap:6px">${S.theme==='dark'?'☀️ وضع نهاري':'🌙 وضع ليلي'}</div></div>
      </div>
    </div>
  `;
}

function buildTopbar(){
  const p=S.currentProfile||{};
  return `
    <div class="topbar">
      <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:900;background:linear-gradient(135deg,var(--accent2),var(--warm));-webkit-background-clip:text;-webkit-text-fill-color:transparent">Wasla - وصلة</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="theme-toggle" onclick="toggleTheme()">${S.theme==='dark'?'☀️':'🌙'}</div>
        <div class="avatar-ph" style="width:34px;height:34px;font-size:12px;cursor:pointer;background:${p.color||'var(--accent)'}" onclick="nav('profile')">${gi(p.name)}</div>
      </div>
    </div>
  `;
}

function buildBottomNav(){
  const items=[{id:'feed',i:'🏠',l:'رئيسية'},{id:'explore',i:'🔍',l:'استكشاف'},{id:'messages',i:'💬',l:'رسائل'},{id:'notifications',i:'🔔',l:'إشعارات'},{id:'profile',i:'👤',l:'حسابي'}];
  return `<nav class="bottom-nav">${items.map(n=>`<div class="bnav-item ${S.page===n.id?'active':''}" onclick="nav('${n.id}')"><div class="bnav-icon">${n.i}</div><div>${n.l}</div></div>`).join('')}</nav>`;
}

// ============================
// FEED
// ============================
function buildFeed(){
  const p=S.currentProfile||{};
  return `
    <div class="composer">
      <div class="composer-row">
        ${p.photoURL?`<img src="${p.photoURL}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0">`:
          `<div class="avatar-ph" style="width:40px;height:40px;font-size:13px;background:${p.color||'var(--accent)'}">${gi(p.name)}</div>`}
        <textarea id="composer-textarea" placeholder="ما الذي يدور في ذهنك؟ ✍️" oninput="S.composerText=this.value">${S.composerText}</textarea>
      </div>
      ${S.composerImagePreview?`
        <div style="position:relative;margin-top:10px;border-radius:12px;overflow:hidden;max-height:240px">
          <img src="${S.composerImagePreview}" style="width:100%;max-height:240px;object-fit:cover;display:block">
          <button onclick="removePostImage()" style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px">✕</button>
        </div>
      `:''}
      <div class="composer-actions">
        <button class="comp-btn" onclick="pickPostImage()">📷 صورة</button>
        <button class="comp-btn">😊 إيموجي</button>
        <button class="btn-primary" id="post-btn" onclick="createPost()" ${S.composerImageUploading?'disabled':''}>
          ${S.composerImageUploading?'<span class="spinner spinner-sm"></span> جاري الرفع...':'نشر ✨'}
        </button>
      </div>
    </div>
    ${S.loadingPosts?`<div style="text-align:center;padding:48px;color:var(--text3)"><div class="spinner" style="margin:auto"></div><div style="margin-top:12px;font-size:14px">جاري تحميل المنشورات...</div></div>`
    :S.posts.length===0?`
      <div style="text-align:center;padding:48px 24px;color:var(--text3)">
        <div style="font-size:52px;margin-bottom:16px">✨</div>
        <div style="font-size:17px;font-weight:700;color:var(--text2);margin-bottom:8px">مرحباً في Wasla - وصلة!</div>
        <div style="font-size:14px;line-height:1.7">انشر أول منشور أو تابع أشخاصاً لترى محتواهم</div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap">
          <button class="btn-primary" onclick="document.getElementById('composer-textarea').focus()">✍️ انشر الآن</button>
          <button class="btn-outline" onclick="nav('explore')">🔍 استكشف</button>
        </div>
      </div>
    `:S.posts.map(buildPost).join('')}
  `;
}

function buildPost(post, allowDelete=true){
  const isMe=post.userId===S.currentUser?.uid;
  const liked=post._liked||S.likedPosts[post.id]||false;
  const cmtsOpen=S.openComments[post.id];
  const cmts=S.commentsData[post.id]||[];
  const canDelete=allowDelete&&(isMe||isAdmin());
  const avatar=post.userPhotoURL?
    `<img src="${post.userPhotoURL}" style="width:42px;height:42px;border-radius:50%;object-fit:cover;cursor:pointer;flex-shrink:0" onclick="viewProfile('${post.userId}')">`:
    `<div class="avatar-ph" style="width:42px;height:42px;font-size:13px;cursor:pointer;background:${post.userColor||'#7c5cfc'}" onclick="viewProfile('${post.userId}')">${gi(post.userName)}</div>`;
  return `
    <div class="post">
      <div class="post-header">
        ${avatar}
        <div class="post-user" style="cursor:pointer" onclick="viewProfile('${post.userId}')">
          <div class="post-name">${escHtml(post.userName)} ${post.userIsAdmin?'<span class="admin-badge">أدمن</span>':''}</div>
          <div class="post-handle">@${escHtml(post.userHandle||'')} · ${ta(post.createdAt)}</div>
        </div>
        ${canDelete?`<button class="btn-outline" style="font-size:12px;padding:4px 10px;color:var(--red);border-color:rgba(255,92,122,.4)" onclick="deletePost('${post.id}')">🗑️</button>`:''}
      </div>
      ${post.text?`<div class="post-body">${escHtml(post.text).replace(/(#\S+)/g,'<span class="hashtag">$1</span>').replace(/\n/g,'<br>')}</div>`:''}
      ${post.imageUrl?`<img class="post-media" src="${post.imageUrl}" loading="lazy" alt="" style="cursor:pointer" onclick="window.open('${post.imageUrl}','_blank')">` : ''}
      <div class="post-actions">
        <button class="act-btn ${liked?'liked':''}" onclick="toggleLike('${post.id}')"><span class="act-icon">${liked?'❤️':'🤍'}</span><span>${fn(post.likes)}</span></button>
        <button class="act-btn" onclick="toggleComments('${post.id}')"><span class="act-icon">💬</span><span>${fn(post.comments)}</span></button>
        <button class="act-btn" onclick="repost('${post.id}')"><span class="act-icon">🔄</span><span>${fn(post.reposts)}</span></button>
        <button class="act-btn" style="margin-right:auto" onclick="toast('تم نسخ الرابط 🔗')"><span class="act-icon">📤</span></button>
      </div>
      ${cmtsOpen?`
        <div class="cmts">
          ${cmts.map(c=>`
            <div class="cmt">
              <div class="avatar-ph" style="width:30px;height:30px;font-size:11px">${gi(c.userName)}</div>
              <div class="cmt-body"><div class="cmt-name">${escHtml(c.userName)}</div><div class="cmt-text">${escHtml(c.text)}</div></div>
            </div>
          `).join('')}
          <div class="cmt-input-row">
            ${S.currentProfile?.photoURL?`<img src="${S.currentProfile.photoURL}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0">`:
              `<div class="avatar-ph" style="width:30px;height:30px;font-size:11px;background:${S.currentProfile?.color||'var(--accent)'}">${gi(S.currentProfile?.name)}</div>`}
            <input class="cmt-input" placeholder="اكتب تعليقاً..." value="${escAttr(S.newComment[post.id]||'')}" oninput="S.newComment['${post.id}']=this.value" onkeydown="if(event.key==='Enter')addComment('${post.id}')">
            <button class="cmt-send" onclick="addComment('${post.id}')">↑</button>
          </div>
        </div>
      `:''}
    </div>
  `;
}

// EXPLORE (with user search)
// ============================
function buildExplore(){
  const postsWithImages=S.posts.filter(p=>p.imageUrl);
  return `
    <div class="page-header"><div class="page-title">استكشاف 🔍</div></div>
    <div class="search-bar">
      <span>🔍</span>
      <input placeholder="ابحث عن أشخاص أو هاشتاقات..." value="${escAttr(S.searchQuery)}"
        oninput="S.searchQuery=this.value;doSearch()"
        onkeydown="if(event.key==='Enter')doSearch()">
      ${S.searchQuery?`<span style="cursor:pointer;color:var(--text3);font-size:16px" onclick="S.searchQuery='';S.searchResults=[];r()">✕</span>`:''}
    </div>

    ${S.searchQuery?`
      <div style="font-size:15px;font-weight:800;margin-bottom:12px">👤 نتائج البحث</div>
      ${S.searchLoading?`<div style="text-align:center;padding:24px"><div class="spinner" style="margin:auto"></div></div>`
      :S.searchResults.length===0?`<div style="text-align:center;padding:32px;color:var(--text3);font-size:14px">مفيش نتائج لـ "${escHtml(S.searchQuery)}"</div>`
      :S.searchResults.map(u=>buildUserCard(u)).join('')}
    `:`
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
        ${['#ترند','#تقنية','#سفر','#قراءة','#فن','#رياضة'].map((t,i)=>`<div class="chip ${i===0?'active':''}">${t}</div>`).join('')}
      </div>
      ${postsWithImages.length>0?`
        <div style="font-size:16px;font-weight:800;margin-bottom:12px">🖼️ صور من المجتمع</div>
        <div class="explore-grid" style="margin-bottom:24px">
          ${postsWithImages.slice(0,9).map(post=>`
            <div class="exp-item" onclick="viewProfile('${post.userId}')">
              <img src="${post.imageUrl}" loading="lazy" alt="">
              <div class="exp-ov">
                <span>❤️ ${fn(post.likes||0)}</span>
                <span>💬 ${fn(post.comments||0)}</span>
              </div>
            </div>
          `).join('')}
        </div>
      `:`
        <div style="text-align:center;padding:48px;color:var(--text3)">
          <div style="font-size:48px;margin-bottom:12px">🖼️</div>
          <div style="font-size:15px;font-weight:700;color:var(--text2)">مفيش صور بعد</div>
          <div style="font-size:13px;margin-top:6px">انشر منشور بصورة وهيظهر هنا</div>
        </div>
      `}
    `}
  `;
}

function buildUserCard(u, showFollowBtn=true){
  const isFollowing=S.followingMap[u.uid];
  const isMe=u.uid===S.currentUser?.uid;
  return `
    <div class="user-card">
      <div class="avatar-ph" style="width:46px;height:46px;font-size:15px;cursor:pointer;background:${u.color||'#7c5cfc'}" onclick="viewProfile('${u.uid}')">${gi(u.name)}</div>
      <div class="user-card-info" style="cursor:pointer" onclick="viewProfile('${u.uid}')">
        <div class="user-card-name">${escHtml(u.name)} ${u.isAdmin?'<span class="admin-badge">أدمن</span>':''}</div>
        <div class="user-card-handle">@${escHtml(u.handle||'')} · ${fn(u.followers||0)} متابع</div>
        ${u.bio?`<div class="user-card-bio">${escHtml(u.bio)}</div>`:''}
      </div>
      ${showFollowBtn&&!isMe?`
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="follow-btn ${isFollowing?'unfollow':'follow'}"
            onclick="toggleFollow('${u.uid}',${JSON.stringify({name:u.name}).replace(/"/g,'&quot;')})">
            ${isFollowing?'إلغاء المتابعة':'متابعة'}
          </button>
          <button class="btn-outline" style="font-size:11px;padding:4px 10px;text-align:center"
            onclick="startMessageWith('${u.uid}',${JSON.stringify({uid:u.uid,name:u.name,handle:u.handle,color:u.color}).replace(/"/g,'&quot;')})">💬</button>
        </div>
      `:''}
    </div>
  `;
}

// NOTIFICATIONS
// ============================
function buildNotifs(){
  const notifIcon={like:'❤️',follow:'👤',comment:'💬'};
  return `
    <div class="page-header"><div class="page-title">الإشعارات 🔔</div></div>
    ${S.notifications.length===0?`
      <div style="text-align:center;padding:48px;color:var(--text3)">
        <div style="font-size:48px;margin-bottom:12px">🔔</div>
        <div style="font-size:15px;font-weight:700;color:var(--text2)">مفيش إشعارات دلوقتي</div>
        <div style="font-size:13px;margin-top:6px">لما حد يعجبه منشورك أو يتابعك هيظهر هنا</div>
      </div>
    `:S.notifications.map(n=>`
      <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid ${n.read?'var(--border)':'var(--accent)'};border-radius:14px;margin-bottom:10px;transition:all .2s;opacity:${n.read?.8:1}">
        <div style="font-size:26px">${notifIcon[n.type]||'🔔'}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;color:var(--text)">${escHtml(n.fromUserName||'')} <span style="font-weight:500;color:var(--text2)">${escHtml(n.text||'')}</span></div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">${ta(n.createdAt)}</div>
        </div>
        ${!n.read?`<div style="width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0"></div>`:''}
      </div>
    `).join('')}
  `;
}

// ============================
// MESSAGES
// ============================
function buildMessages(){
  const myUid=S.currentUser?.uid;
  const p=S.currentProfile||{};
  return `
    <div style="flex:1;display:flex;overflow:hidden;height:100%">
      <!-- Conversations list -->
      <div style="width:280px;border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column">
        <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:16px;font-weight:800">الرسائل 💬</div>
          <button class="theme-toggle" onclick="nav('explore')" title="ابحث عن شخص">✍️</button>
        </div>
        ${S.convoLoading?`<div style="text-align:center;padding:32px"><div class="spinner" style="margin:auto"></div></div>`
        :S.conversations.length===0?`
          <div style="text-align:center;padding:32px 16px;color:var(--text3)">
            <div style="font-size:36px;margin-bottom:8px">💬</div>
            <div style="font-size:13px;font-weight:700;color:var(--text2)">مفيش محادثات بعد</div>
            <div style="font-size:12px;margin-top:4px">ابحث عن حد وابدأ كلام</div>
            <button class="btn-primary" style="margin-top:12px;font-size:12px;padding:7px 14px" onclick="nav('explore')">🔍 ابحث عن أشخاص</button>
          </div>
        `:S.conversations.map(c=>{
          const op=c.otherProfile||{};
          const isActive=S.activeConvo===c.id;
          return `
          <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);background:${isActive?'var(--bg3)':'transparent'};transition:background .15s" onclick="openConvo('${op.uid}',${JSON.stringify(op).replace(/"/g,'&quot;')})">
            <div class="avatar-ph" style="width:42px;height:42px;font-size:14px;background:${op.color||'#7c5cfc'};flex-shrink:0">${gi(op.name)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:700;color:var(--text)">${escHtml(op.name||'')}</div>
              <div style="font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(c.lastMsg||'بدأ المحادثة')}</div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <!-- Chat window -->
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        ${!S.activeConvo?`
          <div style="flex:1;display:flex;align-items:center;justify-content:center">
            <div style="text-align:center;color:var(--text3)">
              <div style="font-size:52px;margin-bottom:12px">💬</div>
              <div style="font-weight:800;font-size:17px;color:var(--text2)">اختر محادثة</div>
              <div style="font-size:13px;margin-top:6px">أو ابدأ محادثة جديدة</div>
              <button class="btn-primary" style="margin-top:16px" onclick="nav('explore')">🔍 ابحث عن أشخاص</button>
            </div>
          </div>
        `:`
          <!-- Chat header -->
          <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface)">
            <button class="btn-outline" style="padding:4px 10px;font-size:12px" onclick="closeConvo()">←</button>
            <div class="avatar-ph" style="width:36px;height:36px;font-size:12px;cursor:pointer;background:${S.activeConvoProfile?.color||'#7c5cfc'}" onclick="viewProfile('${S.activeConvoProfile?.uid||''}')">${gi(S.activeConvoProfile?.name)}</div>
            <div style="flex:1;cursor:pointer" onclick="viewProfile('${S.activeConvoProfile?.uid||''}')">
              <div style="font-size:14px;font-weight:700">${escHtml(S.activeConvoProfile?.name||'')}</div>
              <div style="font-size:11px;color:var(--text3)">@${escHtml(S.activeConvoProfile?.handle||'')}</div>
            </div>
          </div>
          <!-- Messages -->
          <div id="msgs-scroll" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px">
            ${S.convoMessages.length===0?`<div style="text-align:center;color:var(--text3);font-size:13px;margin-top:24px">ابدأ المحادثة مع ${escHtml(S.activeConvoProfile?.name||'')} 👋</div>`
            :S.convoMessages.map(m=>{
              const isMe=m.userId===myUid;
              return `
              <div style="display:flex;justify-content:${isMe?'flex-end':'flex-start'}">
                <div style="max-width:70%;padding:10px 14px;border-radius:${isMe?'18px 18px 4px 18px':'18px 18px 18px 4px'};background:${isMe?'linear-gradient(135deg,var(--accent),var(--accent2))':'var(--surface2)'};color:${isMe?'#fff':'var(--text)'};font-size:14px;line-height:1.5;box-shadow:0 2px 8px rgba(0,0,0,.15)">
                  ${escHtml(m.text)}
                  <div style="font-size:10px;opacity:.6;margin-top:4px;text-align:${isMe?'left':'right'}">${ta(m.createdAt)}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
          <!-- Input -->
          <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--surface)">
            <input class="cmt-input" id="msg-input" placeholder="اكتب رسالة..." value="${escAttr(S.msgText||'')}"
              oninput="S.msgText=this.value"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){sendMessage();event.preventDefault()}"
              style="flex:1;border-radius:24px;padding:10px 16px;font-size:14px">
            <button class="cmt-send" onclick="sendMessage()" style="width:40px;height:40px;font-size:18px">↑</button>
          </div>
        `}
      </div>
    </div>
  `;
}

// ============================
// MY PROFILE
// ============================
function buildProfile(){
  const p=S.currentProfile||{};
  const uid=S.currentUser?.uid;
  const myPosts=S.posts.filter(pt=>pt.userId===uid);
  return buildProfileLayout(p, uid, myPosts, true);
}

// ============================
// VIEW OTHER PROFILE
// ============================
function buildViewProfile(){
  if(!S.viewingProfile){
    return `<div style="text-align:center;padding:60px"><div class="spinner" style="margin:auto"></div></div>`;
  }
  const p=S.viewingProfile;
  const uid=p.uid;
  return buildProfileLayout(p, uid, S.viewingProfilePosts, false);
}

function buildProfileLayout(p, uid, posts, isMyProfile){
  const isFollowing=S.followingMap[uid];
  const coverStyle=p.coverURL?`background:url('${p.coverURL}') center/cover no-repeat`:
    `background:linear-gradient(135deg,${p.color||'#7c5cfc'},#ff8c42,#ff6eb4)`;
  return `
    ${isMyProfile&&S.editingProfile?buildEditProfileModal():''}
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;margin-bottom:16px;overflow:hidden">
      <div style="height:180px;${coverStyle};position:relative">
        ${isMyProfile?`<button onclick="uploadCoverPhoto()" style="position:absolute;top:10px;left:10px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:10px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700">📷 تغيير الغلاف</button>`:''}
        ${!isMyProfile?`<button class="btn-outline" style="position:absolute;top:12px;left:12px;font-size:12px;padding:5px 12px;background:rgba(0,0,0,.3);border-color:rgba(255,255,255,.3);color:#fff" onclick="S.page=S.prevPage||'feed';r()">← رجوع</button>`:''}
        <div style="position:absolute;bottom:-40px;right:24px;cursor:${isMyProfile?'pointer':'default'}" ${isMyProfile?'onclick="uploadProfilePhoto()"':''}>
          ${p.photoURL?
            `<div style="position:relative">
              <img src="${p.photoURL}" style="width:84px;height:84px;border-radius:50%;object-fit:cover;border:4px solid var(--bg2)">
              ${isMyProfile?`<div style="position:absolute;inset:0;background:rgba(0,0,0,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0"><span style="font-size:20px">📷</span></div>`:''}
            </div>`:
            `<div style="position:relative">
              <div class="avatar-ph" style="width:84px;height:84px;font-size:28px;border:4px solid var(--bg2);background:${p.color||'var(--accent)'}">${gi(p.name)}</div>
              ${isMyProfile?`<div style="position:absolute;bottom:0;left:0;background:var(--accent);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid var(--bg2)">📷</div>`:''}
            </div>`
          }
        </div>
      </div>
      <div style="padding:52px 24px 20px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
          <div>
            <div style="font-size:22px;font-weight:800">${escHtml(p.name||'مستخدم')} ${p.isAdmin?'<span class="admin-badge">أدمن</span>':''}</div>
            <div style="font-size:14px;color:var(--text3);margin-top:2px">@${escHtml(p.handle||'')}</div>
            <div style="font-size:14px;color:var(--text2);margin-top:8px">${escHtml(p.bio||'لا توجد نبذة بعد')}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${isMyProfile?`<button class="btn-outline" onclick="openEditProfile()">✏️ تعديل الحساب</button>`:''}
            ${!isMyProfile?`
              <button class="follow-btn ${isFollowing?'unfollow':'follow'}" onclick="toggleFollow('${uid}',{name:'${escAttr(p.name)}'})">
                ${isFollowing?'إلغاء المتابعة ✓':'متابعة +'}
              </button>
              <button class="btn-outline" onclick="startMessageWith('${uid}',${JSON.stringify({uid,name:p.name,handle:p.handle,color:p.color}).replace(/"/g,'&quot;')})" style="padding:8px 14px;font-size:13px">💬 رسالة</button>
            `:''}
          </div>
        </div>
        <div style="display:flex;gap:24px;margin-top:16px">
          <div style="text-align:center"><div style="font-size:20px;font-weight:800;font-family:'Syne',sans-serif">${posts.length}</div><div style="font-size:12px;color:var(--text3)">منشور</div></div>
          <div style="text-align:center;cursor:pointer" onclick="showFollowModal('${uid}','followers')">
            <div style="font-size:20px;font-weight:800;font-family:'Syne',sans-serif">${fn(p.followers||0)}</div>
            <div style="font-size:12px;color:var(--accent2)">متابع</div>
          </div>
          <div style="text-align:center;cursor:pointer" onclick="showFollowModal('${uid}','following')">
            <div style="font-size:20px;font-weight:800;font-family:'Syne',sans-serif">${fn(p.following||0)}</div>
            <div style="font-size:12px;color:var(--accent2)">يتابع</div>
          </div>
        </div>
        ${isMyProfile?`<div style="margin-top:14px"><button class="btn-outline" style="color:var(--red);border-color:rgba(255,92,122,.4)" onclick="doLogout()">🚪 تسجيل الخروج</button></div>`:''}
      </div>
    </div>
    <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:16px">
      <div class="profile-tab active">📝 المنشورات</div>
    </div>
    ${posts.length===0?`<div style="text-align:center;color:var(--text3);padding:40px;font-size:14px">لا توجد منشورات بعد ✍️</div>`:posts.map(post=>buildPost(post,isMyProfile||isAdmin())).join('')}
  `;
}

function buildEditProfileModal(){
  const p=S.currentProfile||{};
  return `
    <div class="overlay" onclick="if(event.target===this)closeEditProfile()">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:420px;overflow:hidden">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:16px;font-weight:800">✏️ تعديل الحساب</div>
          <button class="btn-outline" style="padding:4px 12px;font-size:13px" onclick="closeEditProfile()">✕</button>
        </div>
        <div style="padding:20px">
          <div class="input-group">
            <label class="input-label">الاسم الكامل</label>
            <input class="input-field" id="edit-name" value="${escAttr(p.name||'')}" placeholder="اسمك">
          </div>
          <div class="input-group">
            <label class="input-label">نبذة شخصية</label>
            <textarea class="input-field" id="edit-bio" placeholder="اكتب نبذة عنك..." style="min-height:80px;resize:none">${escHtml(p.bio||'')}</textarea>
          </div>
          <div style="display:flex;gap:10px;margin-top:4px">
            <button class="btn-primary" style="flex:1;justify-content:center" onclick="saveProfile()">💾 حفظ</button>
            <button class="btn-outline" onclick="closeEditProfile()">إلغاء</button>
          </div>
        </div>
      </div>

}

// ============================
// FOLLOW MODAL
// ============================
function buildFollowModal(){
  return `
    <div class="overlay" onclick="if(event.target===this)closeFollowModal()">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:440px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:16px;font-weight:800">${S.followModal==='followers'?'المتابعون 👥':'يتابع 👁️'}</div>
          <button class="btn-outline" style="padding:4px 12px;font-size:13px" onclick="closeFollowModal()">✕</button>
        </div>
        <div style="overflow-y:auto;padding:12px">
          ${S.followModalLoading?`<div style="text-align:center;padding:32px"><div class="spinner" style="margin:auto"></div></div>`
          :S.followModalList.length===0?`<div style="text-align:center;padding:32px;color:var(--text3);font-size:14px">لا يوجد أحد هنا</div>`
          :S.followModalList.map(u=>buildUserCard(u)).join('')}
        </div>
      </div>
    </div>
  `;
}

// ============================
// ADMIN PANEL
// ============================
function buildAdmin(){
  if(!isAdmin()) return `<div style="text-align:center;padding:60px;color:var(--red)">⛔ غير مسموح</div>`;
  if(!S.adminStats.users) loadAdminStats();
  return `
    <div class="page-header">
      <div class="page-title">⚡ لوحة الإدارة</div>
      <span class="admin-badge" style="font-size:12px;padding:4px 10px">أدمن</span>
    </div>
    <div class="admin-panel">
      <div style="font-size:14px;font-weight:800;margin-bottom:14px;color:var(--warm)">📊 إحصائيات</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div class="admin-stat">
          <div class="admin-stat-num">${S.adminStats.users||0}</div>
          <div class="admin-stat-label">👤 مستخدم</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat-num">${S.adminStats.posts||0}</div>
          <div class="admin-stat-label">📝 منشور</div>
        </div>
      </div>
      <button class="btn-primary" style="margin-right:0;width:100%;justify-content:center" onclick="loadAdminStats()">🔄 تحديث الإحصائيات</button>
    </div>

    <div style="font-size:15px;font-weight:800;margin-bottom:12px">👥 المستخدمون</div>
    ${S.adminUsers.length===0?`<div style="text-align:center;padding:24px;color:var(--text3);font-size:14px">اضغط تحديث لتحميل المستخدمين</div>`
    :S.adminUsers.map(u=>`
      <div class="user-card">
        <div class="avatar-ph" style="width:42px;height:42px;font-size:14px;background:${u.color||'#7c5cfc'}">${gi(u.name)}</div>
        <div class="user-card-info">
          <div class="user-card-name">${escHtml(u.name)} ${u.isAdmin?'<span class="admin-badge">أدمن</span>':''}</div>
          <div class="user-card-handle">@${escHtml(u.handle||'')} · ${u.email||''}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${fn(u.followers||0)} متابع · ${fn(u.following||0)} يتابع</div>
        </div>
        ${!u.isAdmin?`<button class="btn-outline" style="font-size:12px;padding:4px 10px;color:var(--red);border-color:rgba(255,92,122,.4)" onclick="adminDeleteUser('${u.uid}')">🗑️</button>`:''}
      </div>
    `).join('')}

    <div style="font-size:15px;font-weight:800;margin:20px 0 12px">📝 كل المنشورات</div>
    ${S.posts.map(post=>buildPost(post,true)).join('')}
  `;
}

// ============================
// RIGHT PANEL
// ============================
function buildRightPanel(){
  return `
    <div class="right-panel">
      <div style="font-size:16px;font-weight:800;margin-bottom:14px">🔥 الهاشتاقات الرائجة</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:8px;margin-bottom:16px">
        ${S.realTrending.length===0?
        '<div style="text-align:center;padding:12px;color:var(--text3);font-size:13px">لا توجد هاشتاقات بعد</div>'
        :S.realTrending.map((t,i)=>`<div class="trending-item" style="cursor:pointer" onclick="S.searchQuery='${escAttr(t.tag)}';S.page='explore';doSearch();r()"><div><div class="trending-tag">${t.tag}</div><div class="trending-count">${t.count}</div></div><div class="trending-num">${t.num}</div></div>`).join('')}
      </div>
      <div style="font-size:15px;font-weight:800;margin-bottom:12px">👤 اقتراحات للمتابعة</div>
      <div id="suggestions-area">
        <div style="text-align:center;padding:16px;color:var(--text3);font-size:13px">جاري التحميل...</div>
      </div>
      <div style="text-align:center;font-size:11px;color:var(--text3);margin-top:16px">Wasla - وصلة © ٢٠٢٥<br><span style="color:var(--accent2);cursor:pointer">الشروط</span> · <span style="color:var(--accent2);cursor:pointer">الخصوصية</span></div>
    </div>
  `;
}

// Load suggestions for right panel
async function loadSuggestions(){
  const area=document.getElementById('suggestions-area');
  if(!area||!S.currentUser)return;
  try{
    const snap=await db.collection('wasla_profiles').limit(5).get();
    const users=snap.docs
      .map(d=>({uid:d.id,...d.data()}))
      .filter(u=>u.uid!==S.currentUser.uid&&!S.followingMap[u.uid])
      .slice(0,3);
    if(users.length===0){area.innerHTML=`<div style="font-size:13px;color:var(--text3);text-align:center;padding:8px">مفيش اقتراحات دلوقتي</div>`;return;}
    area.innerHTML=users.map(u=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border)">
        <div class="avatar-ph" style="width:36px;height:36px;font-size:12px;cursor:pointer;background:${u.color||'#7c5cfc'}" onclick="viewProfile('${u.uid}')">${gi(u.name)}</div>
        <div style="flex:1;min-width:0;cursor:pointer" onclick="viewProfile('${u.uid}')">
          <div style="font-size:13px;font-weight:700">${escHtml(u.name)}</div>
          <div style="font-size:11px;color:var(--text3)">@${escHtml(u.handle||'')}</div>
        </div>
        <button class="follow-btn follow" style="font-size:12px;padding:5px 12px" onclick="toggleFollow('${u.uid}',{name:'${escAttr(u.name)}'});loadSuggestions()">+متابعة</button>
      </div>
    `).join('');
  }catch(e){}
}

// ============================
// UTILS
// ============================
function escHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escAttr(str){return String(str||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function nav(page){
  S.page=page;
  S.viewingProfile=null;
  S.searchQuery='';
  S.searchResults=[];
  r();
  if(page==='notifications'){markNotifsRead();}
  if(page==='messages'){setTimeout(loadConversations,200);}
  if(page!=='messages') setTimeout(loadSuggestions, 300);
}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';r();}
function switchAuth(mode){S.authMode=mode;S.authError='';r();}

// Load suggestions on initial render
setTimeout(()=>{if(S.currentUser)loadSuggestions();},1000);
</script>
</body>
</html>
